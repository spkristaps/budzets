<!DOCTYPE html>
<!-- Norāda, ka dokuments ir HTML5 -->

<html lang="lv">
<!-- HTML dokuments ar valodu latviešu -->

<head>
    <meta charset="UTF-8">
    <!-- Rakstzīmju kodējums (lai pareizi attēlotu latviešu burtus) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Nodrošina, ka lapa pareizi izskatās uz mobilajām ierīcēm -->

    <title>Bilance</title>
    <!-- Lapas nosaukums pārlūkā -->

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Pievieno CSS failu, izmantojot Flask funkciju -->
</head>

<body>
    <!-- Dekoratīvais fona slānis -->
    <div class="page-bg"></div>

    <!-- Galvenais lapas konteineris -->
    <div class="container">

        <!-- Augšējā sadaļa (hero sekcija) -->
        <header class="hero small-hero">
            <div>
                <!-- Mazais virsraksts -->
                <p class="eyebrow">Kopsavilkums</p>

                <!-- Galvenais virsraksts -->
                <h1>Bilances pārskats</h1>

                <!-- Apraksts -->
                <p class="subtitle">
                    Šeit vari ātri apskatīt kopējos ienākumus, izdevumus un gala bilanci.
                </p>
            </div>

            <!-- Navigācijas pogas -->
            <nav class="nav">
                <!-- Saite uz galveno lapu -->
                <a class="nav-btn" href="/">Sākums</a>

                <!-- Saite uz bilances lapu (aktīvā sadaļa) -->
                <a class="nav-btn nav-btn-secondary" href="/bilance">Bilance</a>
            </nav>
        </header>

        <!-- Kopsavilkuma kartīšu sadaļa -->
        <section class="summary-grid big-summary">

            <!-- Ienākumu kartīte -->
            <div class="summary-card income">
                <span class="summary-label">Kopējie ienākumi</span>
                <!-- Flask ievieto aprēķināto ienākumu summu -->
                <h3>{{ "%.2f"|format(ienakumi) }} €</h3>
            </div>

            <!-- Izdevumu kartīte -->
            <div class="summary-card expense">
                <span class="summary-label">Kopējie izdevumi</span>
                <!-- Flask ievieto aprēķināto izdevumu summu -->
                <h3>{{ "%.2f"|format(izdevumi) }} €</h3>
            </div>

            <!-- Bilances kartīte -->
            <div class="summary-card balance">
                <span class="summary-label">Kopējā bilance</span>
                <!-- Flask ievieto gala bilanci -->
                <h3>{{ "%.2f"|format(bilance) }} €</h3>
            </div>

        </section>
    </div>
</body>
</html>
